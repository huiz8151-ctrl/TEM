<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APP-音乐宠物</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="stage">
    <section class="phone" aria-live="polite">
      <div class="status-bar">
        <span>9:41</span>
        <span class="dynamic-island"></span>
        <span class="status-icons" aria-hidden="true">
          <i class="signal"></i>
          <i class="wifi"></i>
          <i class="battery"></i>
        </span>
      </div>

      <header class="top-bar" id="topBar"></header>
      <section class="screen" id="screen"></section>

      <nav class="tab-bar" aria-label="主导航">
        <button class="tab-button" data-route="home" type="button">
          <i class="tab-icon home-icon"></i>
          <span>首页</span>
        </button>
        <button class="tab-button" data-route="video" type="button">
          <i class="tab-icon video-icon"></i>
          <span>视频</span>
        </button>
        <button class="tab-button center-tab" data-route="camera" type="button" aria-label="拍照推荐">
          <i class="note-icon"></i>
        </button>
        <button class="tab-button" data-route="diary-list" type="button">
          <i class="tab-icon diary-icon"></i>
          <span>日记</span>
        </button>
        <button class="tab-button" data-route="profile" type="button">
          <i class="tab-icon profile-icon"></i>
          <span>我的</span>
        </button>
      </nav>

      <i class="home-indicator" aria-hidden="true"></i>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
